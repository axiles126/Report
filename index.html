    colInt = colInt - Z + A - 1;
  }

 * MGRS table set for the zone number, figure out the easting value that
 * should be added to the other, secondary easting value.
 *
 * @private
 * @param {char} e The first letter from a two-letter MGRS 100´k zone.
 * @param {number} set The MGRS table set for the zone number.
 * @return {number} The easting value for the given letter and set.

  // column

  var eastingValue = 100000.0;
  var rewindMarker = false;

    curCol++;
    if (curCol === I) {
      curCol++;
    }
    if (curCol === O) {
      curCol++;
    }
    if (curCol > Z) {
      if (rewindMarker) {
        throw ("Bad character: " + e);
      }
      curCol = A;
      rewindMarker = true;
    }
    eastingValue += 100000.0;
  }

  return eastingValue;

 * MGRS table set for the zone number, figure out the northing value that
 * should be added to the other, secondary northing value. You have to
 * remember that Northings are determined from the equator, and the vertical
 * cycle of letters mean a 2000000 additional northing meters. This happens
 * approx. every 18 degrees of latitude. This method does *NOT* count any
 * additional northings. You have to figure out how many 2000000 meters need

  if (n > 'V') {
    throw ("MGRSPoint given invalid Northing " + n);
  }

  // column
  var curRow = SET_ORIGIN_ROW_LETTERS.charCodeAt(set - 1);
  var northingValue = 0.0;
  var rewindMarker = false;

  while (curRow !== n.charCodeAt(0)) {
    curRow++;
    if (curRow === I) {
      curRow++;

    if (curRow === O) {
      curRow++;

    // when 'n' is a wrong character

      if (rewindMarker) { // making sure that this loop ends
        throw ("Bad character: " + n);

      curRow = A;
      rewindMarker = true;

    northingValue += 100000.0;
  }

  return northingValue;

  <div class="card">

<script>
  const $ = s => document.querySelector(s);
  const status = (msg, cls) => { const e = $('#status'); e.className = cls || 'dim'; e.textContent = msg; };

  function fmt(ms) {
    const t = Math.floor(ms / 1000);
    const h = Math.floor(t / 3600), m = Math.floor((t % 3600) / 60), s = t % 60;
    const mm = String(m).padStart(2, '0'), ss = String(s).padStart(2, '0');
    return h > 0 ? h + ':' + mm + ':' + ss : mm + ':' + ss;
  }
  function clockNow() { return new Date().toLocaleString('uk-UA', { hour12: false }); }
  function hm(ts) { return new Date(ts).toLocaleTimeString('uk-UA', { hour: '2-digit', minute: '2-digit', hour12: false }); }

  // ---- хранилище (безопасно: если недоступно — работаем в памяти) ----
  const store = {
    get(k){ try { return localStorage.getItem(k); } catch (e) { return null; } },
    set(k,v){ try { localStorage.setItem(k,v); } catch (e) {} }
  };
  const DAY = 24 * 3600 * 1000;

  // ---- IndexedDB: надёжная "база" на устройстве (localStorage — быстрый кэш) ----
  const DB_NAME = 'kapibara', STORE = 'kv';
  let _dbp = null;
  function openDB() {
    if (_dbp) return _dbp;
    _dbp = new Promise((resolve, reject) => {
      let req;
      try { req = indexedDB.open(DB_NAME, 1); } catch (e) { reject(e); return; }
      req.onupgradeneeded = () => req.result.createObjectStore(STORE);
      req.onsuccess = () => resolve(req.result);
      req.onerror = () => reject(req.error);
    });
    return _dbp;
  }
  async function idbSet(key, val) {
    try {
      const db = await openDB();
      await new Promise((res, rej) => {
        const tx = db.transaction(STORE, 'readwrite');
        tx.objectStore(STORE).put(val, key);
        tx.oncomplete = res; tx.onerror = () => rej(tx.error); tx.onabort = () => rej(tx.error);
      });
    } catch (e) { /* IDB недоступна — остаётся localStorage */ }
  }
  async function idbGet(key) {
    try {
      const db = await openDB();
      return await new Promise((res, rej) => {
        const tx = db.transaction(STORE, 'readonly');
        const r = tx.objectStore(STORE).get(key);
        r.onsuccess = () => res(r.result);
        r.onerror = () => rej(r.error);
      });
    } catch (e) { return undefined; }
  }

  // записи полётов: { t: timestamp, c: коментар }
  function loadFlights() {
    try {
      const arr = JSON.parse(store.get('kap_flights') || '[]');
      return arr.map(x => typeof x === 'number' ? { t: x, c: '' } : { t: x.t, c: x.c || '', lt: x.lt });
    } catch (e) { return []; }
  }
  let flights = loadFlights();
  let activeRec = null;   // полёт, к которому привязан комментарий (до следующего взльоту)

  function saveFlights() {
    const cut = Date.now() - 8 * DAY;   // зберігаємо 8 діб — для тижневого звіту
    flights = flights.filter(f => f.t >= cut);
    store.set('kap_flights', JSON.stringify(flights));
    idbSet('kap_flights', flights);
  }
  function withinDays(n) { const cut = Date.now() - n * DAY; return flights.filter(f => f.t >= cut); }
  function within24() { return withinDays(1); }
  function count24h() { return within24().length; }
  function renderStats() { $('#stats').textContent = 'Вилетів за 24 год: ' + count24h(); }

  // ---- таймер полёта ----
  let flying = false, startTs = 0, tick = null;
  let takeoffStr = '', landingStr = '', lastFlightMs = 0, wakeLock = null;

  function buzz(p) { if (navigator.vibrate) { try { navigator.vibrate(p); } catch (e) {} } }
  async function lockScreen() { try { if ('wakeLock' in navigator) wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {} }
  function unlockScreen() { try { if (wakeLock) { wakeLock.release(); wakeLock = null; } } catch (e) {} }

  function renderClock() { $('#clock').textContent = fmt(Date.now() - startTs); }

  function showInfo() {
    const lines = [];
    if (takeoffStr) lines.push('Взліт: ' + takeoffStr);
    if (landingStr) lines.push('Сів: ' + landingStr);
    if (lastFlightMs > 0) lines.push('У польоті: ' + fmt(lastFlightMs));
    $('#flight').textContent = lines.length ? lines.join('\n') : 'таймер зупинено';
  }

  function takeoff() {
    flying = true; startTs = Date.now(); takeoffStr = clockNow(); landingStr = ''; lastFlightMs = 0;
    $('#comments').value = '';                  // новый вылет — чистый комментарий
    activeRec = { t: Date.now(), c: '' };        // создаём запись вылета
    flights.push(activeRec); saveFlights(); renderStats();
    $('#clock').classList.add('live');
    $('#takeoff').textContent = 'Сів';
    $('#takeoff').classList.add('flying');
    renderClock(); showInfo();
    tick = setInterval(renderClock, 250);
    lockScreen(); buzz(40);
  }

  function landing() {
    flying = false; clearInterval(tick); tick = null;
    lastFlightMs = Date.now() - startTs; landingStr = clockNow();
    if (activeRec) { activeRec.lt = Date.now(); saveFlights(); }
    // комментарий уже привязан к activeRec через ввод; activeRec остаётся до след. взльоту
    $('#clock').textContent = fmt(lastFlightMs);
    $('#clock').classList.remove('live');
    $('#takeoff').textContent = 'Взліт пішов';
    $('#takeoff').classList.remove('flying');
    showInfo(); unlockScreen(); buzz([40, 60, 40]);
  }

  $('#takeoff').addEventListener('click', () => (flying ? landing() : takeoff()));
  document.addEventListener('visibilitychange', () => { if (flying && document.visibilityState === 'visible') lockScreen(); });

  // ---- привязка комментария к текущему/последнему вылету (до/после посадки) ----
  $('#comments').addEventListener('input', () => {
    if (activeRec) { activeRec.c = $('#comments').value; saveFlights(); }
  });

  // ---- шаблони коментарів ----
  function loadTemplates() {
    try { const v = JSON.parse(store.get('kap_templates') || 'null'); if (Array.isArray(v)) return v; } catch (e) {}
    return ['Коригування артилерії', 'Коригування fpv', 'Супровід піхоти', 'Коригування вампира', 'Супровід nrk', 'Розвідка', 'Виявлення противника', 'Виявлення ворожого укриття', 'Влучання в ціль fpv'];
  }
  let templates = loadTemplates();
  function saveTemplates() { store.set('kap_templates', JSON.stringify(templates)); idbSet('kap_templates', templates); }

  function insertTemplate(text) {
    const ta = $('#comments');
    const cur = ta.value.trim();
    ta.value = cur ? (cur + ', ' + text) : text;
    ta.dispatchEvent(new Event('input'));   // привязка к вылету + сохранение
    ta.focus();
  }

  let tplEdit = false;
  function renderTemplates() {
    const box = $('#tpls'); box.innerHTML = '';
    box.classList.toggle('editing', tplEdit);
    templates.forEach((t, i) => {
      const b = document.createElement('button');
      b.className = 'tpl';
      b.textContent = tplEdit ? ('✕ ' + t) : t;
      b.addEventListener('click', () => {
        if (tplEdit) { templates.splice(i, 1); saveTemplates(); renderTemplates(); }
        else insertTemplate(t);
      });
      box.appendChild(b);
    });
    const add = document.createElement('button');
    add.className = 'tpl add'; add.textContent = '+';
    add.title = 'Додати шаблон';
    add.addEventListener('click', () => { const e = $('#tpladd'); e.hidden = !e.hidden; if (!e.hidden) $('#tplnew').focus(); });
    box.appendChild(add);
    const ed = document.createElement('button');
    ed.className = 'tpl edit'; ed.textContent = tplEdit ? 'готово' : '✎';
    ed.title = 'Редагувати';
    ed.addEventListener('click', () => { tplEdit = !tplEdit; renderTemplates(); });
    box.appendChild(ed);
  }
  function addTemplate() {
    const v = $('#tplnew').value.trim();
    if (!v) return;
    if (!templates.includes(v)) templates.push(v);
    saveTemplates();
    $('#tplnew').value = ''; $('#tpladd').hidden = true;
    renderTemplates();
  }
  $('#tpladdbtn').addEventListener('click', addTemplate);
  $('#tplnew').addEventListener('keydown', e => { if (e.key === 'Enter') { e.preventDefault(); addTemplate(); } });
  $('#tpltoggle').addEventListener('click', () => {
    const box = $('#tpls');
    box.hidden = !box.hidden;
    if (box.hidden) { $('#tpladd').hidden = true; tplEdit = false; renderTemplates(); }
    $('#tpltoggle').textContent = box.hidden ? 'Шаблони ▾' : 'Шаблони ▴';
  });
  renderTemplates();

  // ---- название и чекбокс (с запоминанием) ----
  const savedName = store.get('kap_name');
  if (savedName) $('#callsign').value = savedName;
  function nameToggleLabel() {
    const open = !$('#namebox').hidden;
    const nm = $('#callsign').value.trim() || 'Назва';
    $('#nametoggle').textContent = nm + (open ? ' ▴' : ' ▾');
  }
  $('#nametoggle').addEventListener('click', () => { $('#namebox').hidden = !$('#namebox').hidden; nameToggleLabel(); });
  $('#callsign').addEventListener('input', () => { const v = $('#callsign').value; store.set('kap_name', v); idbSet('kap_name', v); nameToggleLabel(); });
  nameToggleLabel();
  let reportMode = store.get('kap_reportmode') || 'current';
  function setMode(m) {
    reportMode = m;
    store.set('kap_reportmode', m); idbSet('kap_reportmode', m);
    document.querySelectorAll('#reportmode button').forEach(b => b.classList.toggle('on', b.dataset.mode === m));
  }
  document.querySelectorAll('#reportmode button').forEach(b => b.addEventListener('click', () => setMode(b.dataset.mode)));
  setMode(reportMode);

  // ---- сборка текста ----
  function pad2(n) { return String(n).padStart(2, '0'); }
  function sortieLine(f) {
    const a = hm(f.t), b = f.lt ? hm(f.lt) : '…';
    const dur = f.lt ? ' (' + fmt(f.lt - f.t) + ')' : '';
    const tx = (f.c || '').trim().replace(/\n+/g, ', ');
    return a + '–' + b + dur + (tx ? ' — ' + tx : '');
  }
  function buildText() {
    const name = $('#callsign').value.trim();
    const c = $('#comments').value.trim();

    if (reportMode === 'shift') {
      // зміна за 24 год: список вильотів (взліт–сів, тривалість, коментар)
      const within = within24();
      const lines = [name ? 'Зміна: ' + name : 'Зміна', 'Вилетів за 24 год: ' + within.length];
      for (const f of within) lines.push(sortieLine(f));
      if (c && !activeRec) lines.push(c);
      return lines.join('\n');
    }

    if (reportMode === 'week') {
      // тиждень: дні зі своїми вильотами (як добові зведення)
      const within = withinDays(7);
      const lines = [name ? 'Тиждень: ' + name : 'Тиждень', 'Усього вилетів: ' + within.length];
      const days = new Map();
      for (const f of within) {
        const d = new Date(f.lt || f.t);
        const key = d.getFullYear() + '-' + pad2(d.getMonth() + 1) + '-' + pad2(d.getDate());
        if (!days.has(key)) days.set(key, []);
        days.get(key).push(f);
      }
      let first = true;
      for (const key of [...days.keys()].sort()) {
        const arr = days.get(key);
        const d = new Date(arr[0].lt || arr[0].t);
        const wd = d.toLocaleDateString('uk-UA', { weekday: 'short' });
        if (!first) lines.push('');
        first = false;
        lines.push(pad2(d.getDate()) + '.' + pad2(d.getMonth() + 1) + ' (' + wd + '): ' + arr.length);
        for (const f of arr) lines.push('  ' + sortieLine(f));
      }
      if (c && !activeRec) lines.push(c);
      return lines.join('\n');
    }

    const lines = [];
    if (name) lines.push(name);
    if (takeoffStr)       lines.push('*Взліт*: ' + takeoffStr);
    if (c)                lines.push('Коментарі: ' + c);
    if (landingStr)       lines.push('*Сів*: ' + landingStr);
    if (lastFlightMs > 0) lines.push('У польоті: ' + fmt(lastFlightMs));
    return lines.join('\n');
  }

  async function fallbackCopy(text) {
    try { await navigator.clipboard.writeText(text); status('Текст скопійовано в буфер, вставте в Signal.', 'ok'); }
    catch (e) { status('Скопируйте текст вручную:\n\n' + text, 'err'); }
  }
  async function share() {
    const text = reportText();
    if (navigator.share) {
      $('#share').disabled = true;
      try { await navigator.share({ title: $('#callsign').value.trim() || 'Звіт', text }); status('✓ Готово', 'ok'); }
      catch (e) { if (e && e.name === 'AbortError') status('Отменено', 'dim'); else await fallbackCopy(text); }
      finally { $('#share').disabled = false; }
    } else { await fallbackCopy(text); }
  }
  $('#share').addEventListener('click', share);

  async function copyText() {
    const text = reportText();
    try { await navigator.clipboard.writeText(text); status('✓ Скопійовано', 'ok'); }
    catch (e) { status('Не вдалося скопіювати. Текст:\n\n' + text, 'err'); }
  }
  $('#copy').addEventListener('click', copyText);

  // ---- попередній перегляд звіту (редагований) ----
  let previewEdited = false;
  function reportText() {
    return $('#previewbox').hidden ? buildText() : $('#preview').value;
  }
  function updatePreview() {
    if (previewEdited) return;                 // не затирати ручні правки
    const t = buildText() || '';
    if ($('#preview').value !== t) $('#preview').value = t;
  }
  $('#preview').addEventListener('input', () => { previewEdited = true; });
  $('#previewbtn').addEventListener('click', () => {
    const box = $('#previewbox');
    box.hidden = !box.hidden;
    $('#previewbtn').textContent = box.hidden ? 'Перегляд звіту' : 'Сховати звіт';
    if (!box.hidden) { previewEdited = false; updatePreview(); }   // відкриваємо — підставляємо свіжий звіт
  });
  // живе оновлення, поки перегляд відкритий і не редагувався вручну
  ['input', 'change', 'click'].forEach(ev =>
    document.addEventListener(ev, () => { if (!$('#previewbox').hidden) updatePreview(); }));

  // ---- карта: вибір координат тапом, підстановка в коментар ----
  function loadLeaflet() {
    if (window.L) return Promise.resolve();
    return new Promise((resolve, reject) => {
      const css = document.createElement('link');
      css.rel = 'stylesheet'; css.href = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.css';
      document.head.appendChild(css);
      const js = document.createElement('script');
      js.src = 'https://unpkg.com/leaflet@1.9.4/dist/leaflet.js';
      js.onload = resolve;
      js.onerror = () => reject(new Error('Мапа не завантажилась (потрібен інтернет)'));
      document.head.appendChild(js);
    });
  }

  let lmap = null, lmarker = null, pickedCoords = '';
  function mgrsPretty(s) {
    const m = s.match(/^(\d{1,2}[C-X])([A-Z]{2})(\d+)$/);
    if (!m) return s;
    const half = m[3].length / 2;
    return m[1] + ' ' + m[2] + ' ' + m[3].slice(0, half) + ' ' + m[3].slice(half);
  }
  function toMGRS(lat, lng) {
    try { return mgrsPretty(mgrs.forward([lng, lat], 5)); }
    catch (e) { return lat.toFixed(6) + ', ' + lng.toFixed(6); }
  }
  let pickSource = 'map';
  function setPick(lat, lng, acc, src) {
    pickSource = src || 'map';
    pickedCoords = toMGRS(lat, lng);
    if (!lmarker) lmarker = L.circleMarker([lat, lng], { radius: 8, color: '#c0392b', weight: 2, fillOpacity: 0.6 }).addTo(lmap);
    else lmarker.setLatLng([lat, lng]);
    $('#mapcoords').textContent = pickedCoords + (acc ? ' · ±' + Math.round(acc) + ' м' : '');
    $('#mapuse').disabled = false;
    startCompass();
    updateCone();
  }
  async function openMap() {
    $('#mapwrap').hidden = false;
    try { await loadLeaflet(); }
    catch (e) { $('#mapwrap').hidden = true; status(e.message, 'err'); return; }
    if (!lmap) {
      lmap = L.map('mapview', { zoomControl: false });
      L.control.zoom({ position: 'bottomleft' }).addTo(lmap);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution: '© OpenStreetMap' }).addTo(lmap);
      fixedLayer = L.layerGroup().addTo(lmap); drawFixed();
      antLayer = L.layerGroup().addTo(lmap);
      lmap.on('click', e => { if (coneMode === 'target' && lmarker) setTarget(e.latlng.lat, e.latlng.lng); else setPick(e.latlng.lat, e.latlng.lng, null, 'map'); });
      lmap.setView([49.99, 36.23], 6);   // Харків / Україна за замовчуванням
      if (navigator.geolocation) navigator.geolocation.getCurrentPosition(
        p => lmap.setView([p.coords.latitude, p.coords.longitude], 13), () => {},
        { enableHighAccuracy: true, timeout: 8000 }
      );
    }
    setTimeout(() => lmap.invalidateSize(), 80);
  }
  $('#map').addEventListener('click', openMap);
  $('#mapcancel').addEventListener('click', () => { $('#mapwrap').hidden = true; });
  $('#mapuse').addEventListener('click', () => {
    if (pickedCoords) {
      const dir = (coneMode === 'target' && targetLL) ? coneDir() : null;
      insertTemplate(dir != null ? pickedCoords + ' · ' + deg(dir) : pickedCoords);
    }
    $('#mapwrap').hidden = true;
  });
  $('#mapgps').addEventListener('click', () => {
    if (!navigator.geolocation) { $('#mapcoords').textContent = 'GPS недоступний'; return; }
    $('#mapcoords').textContent = 'Визначаю GPS…';
    navigator.geolocation.getCurrentPosition(
      p => { const la = p.coords.latitude, lo = p.coords.longitude; if (lmap) lmap.setView([la, lo], 18); setPick(la, lo, p.coords.accuracy, 'gps'); },
      err => { $('#mapcoords').textContent = 'GPS: ' + err.message; },
      { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
    );
  });
  $('#mapcenter').addEventListener('click', () => { if (lmarker) lmap.setView(lmarker.getLatLng(), lmap.getZoom()); });
  $('#mapcopy').addEventListener('click', async () => {
    if (!pickedCoords) return;
    try { await navigator.clipboard.writeText(pickedCoords); $('#mapcoords').textContent = '✓ ' + pickedCoords; }
    catch (e) { $('#mapcoords').textContent = pickedCoords; }
  });

  // ---- компас, ціль, ручний азимут, конус, зафіксовані точки ----
  let heading = null, conePoly = null, compassOn = false;
  let coneMode = 'compass', targetLL = null, targetMarker = null;   // 'compass' | 'target' | 'manual'
  let manualAz = parseInt(store.get('kap_manualaz') || '0', 10);
  let coneR = parseInt(store.get('kap_coner') || '120', 10);
  let coneHalf = parseInt(store.get('kap_conehalf') || '30', 10);
  let coneOn = store.get('kap_coneon') === '1';   // конус за замовчуванням вимкнено
  let fixedLayer = null;
  let fixedPts = loadFixed();

  function loadFixed() {
    try { const v = JSON.parse(store.get('kap_fixed') || '[]'); return Array.isArray(v) ? v : []; } catch (e) { return []; }
  }
  function saveFixed() { store.set('kap_fixed', JSON.stringify(fixedPts)); idbSet('kap_fixed', fixedPts); }
  function conePoints(lat, lng, dir, r, half) {
    const step = Math.max(2, half / 6), pts = [[lat, lng]];
    for (let a = -half; a <= half + 0.001; a += step) pts.push(destPoint(lat, lng, (dir + a + 360) % 360, r));
    pts.push([lat, lng]);
    return pts;
  }
  function drawFixed() {
    if (!fixedLayer) return;
    fixedLayer.clearLayers();
    for (const p of fixedPts) {
      if (p.cone) L.polygon(conePoints(p.lat, p.lng, p.cone.dir, p.cone.r, p.cone.half),
        { color: '#c0392b', weight: 1, fillColor: '#c0392b', fillOpacity: 0.18, interactive: false }).addTo(fixedLayer);
      const col = p.src === 'gps' ? '#1f7a1f' : '#111111';
      L.circleMarker([p.lat, p.lng], { radius: 6, color: col, weight: 2, fillColor: col, fillOpacity: 0.85 })
        .bindTooltip(p.mgrs, { direction: 'top' }).addTo(fixedLayer);
    }
  }

  function deg(x) { return String(Math.round((x + 360) % 360)).padStart(3, '0') + '°'; }
  function fmtLen(m) { return m >= 1000 ? (m / 1000).toFixed(m % 1000 ? 1 : 0) + ' км' : m + ' м'; }

    $('#maptune').hidden = true;

    try{ await loadThree3(); }catch(e){ $('#cone3dwrap').hidden=true; status('Не вдалося завантажити 3D-модуль (потрібен інтернет).','err'); return; }
    init3D();
    const az=coneDir(); state3.az=(az==null?manualAz:Math.round(((az%360)+360)%360));
    state3.beam=Math.round(coneHalf*2); state3.elev=0; state3.range=Math.round(currentConeR());
    state3.antH=Math.round(parseFloat($('#anth').value)||2); state3.terrain=false;
    $('#c3az').value=state3.az; $('#c3azv').textContent=state3.az;
    $('#c3beam').value=state3.beam; $('#c3beamv').textContent=state3.beam;
    $('#c3elev').value=0; $('#c3elevv').textContent=0;
    $('#c3anth').value=state3.antH; $('#c3anthv').textContent=fmtLen(state3.antH);
    $('#c3range').value=Math.min(15000,state3.range); $('#c3rangev').textContent=fmtLen(state3.range);
    $('#c3terr').classList.remove('on'); $('#c3legend').textContent=DEF_LEGEND3;
    setBack3();
    clearTerrainMeshes(); applyMastSymbolic(); rebuildCone3(); resize3();
    if(!t3.raf) animate3();
  }
  $('#cone3d').addEventListener('click', open3D);
  $('#c3close').addEventListener('click', close3D);
  $('#c3az').addEventListener('input',()=>{ state3.az=+$('#c3az').value; $('#c3azv').textContent=state3.az; setBack3(); rebuildCone3(); });
  $('#c3beam').addEventListener('input',()=>{ state3.beam=+$('#c3beam').value; $('#c3beamv').textContent=state3.beam; rebuildCone3(); });
  $('#c3elev').addEventListener('input',()=>{ state3.elev=+$('#c3elev').value; $('#c3elevv').textContent=state3.elev; rebuildCone3(); });
  $('#c3range').addEventListener('input',()=>{ state3.range=+$('#c3range').value; $('#c3rangev').textContent=fmtLen(state3.range); });
  $('#c3reset').addEventListener('click',()=>{ state3.yaw=0.7; state3.pitch=0.9; state3.dist=18; });
  $('#c3anth').addEventListener('input',()=>{ state3.antH=+$('#c3anth').value; $('#c3anthv').textContent=fmtLen(state3.antH);
    $('#anth').value=state3.antH; if(state3.terrain) buildTerrain3(); else applyMastSymbolic(); });
  $('#c3terr').addEventListener('click', async ()=>{
    state3.terrain=!state3.terrain; $('#c3terr').classList.toggle('on', state3.terrain);
    if(state3.terrain) await buildTerrain3();
    else { clearTerrainMeshes(); applyMastSymbolic(); $('#c3legend').textContent=DEF_LEGEND3; }
  });
  $('#c3az').addEventListener('change',()=>{ if(state3.terrain) buildTerrain3(); });
  $('#c3range').addEventListener('change',()=>{ if(state3.terrain) buildTerrain3(); });
  document.querySelectorAll('.freqrow button').forEach(b=> b.addEventListener('click',()=>{ $('#antfreq').value=b.dataset.f; }));
  $('#c3apply').addEventListener('click',()=>{
    coneMode='manual'; manualAz=((state3.az%360)+360)%360; coneHalf=Math.max(5,Math.round(state3.beam/2)); coneR=state3.range;
    store.set('kap_manualaz',String(manualAz)); idbSet('kap_manualaz',String(manualAz));
    store.set('kap_conehalf',String(coneHalf)); idbSet('kap_conehalf',String(coneHalf));
    store.set('kap_coner',String(coneR)); idbSet('kap_coner',String(coneR));
    $('#coneaz').value=manualAz; $('#azval').textContent=manualAz;
    $('#coneang').value=coneHalf*2; $('#angval').textContent=coneHalf*2;
    $('#conelen').value=Math.min(15000,coneR); $('#lenval').textContent=fmtLen(coneR);
    if(!coneOn){ coneOn=true; $('#coneshow').checked=true; store.set('kap_coneon','1'); idbSet('kap_coneon','1'); }
    updateCone(); close3D(); status('✓ Конус застосовано до мапи','ok');
  });

  // ---- антена: сектор покриття з урахуванням рельєфу (онлайн Terrain-RGB) ----
  const DEM_Z = 12;
  const ANT_COLORS = ['#1f5fb8', '#1f7a1f', '#b8431f', '#7a1f7a', '#1f7a7a', '#9a7d0a'];
  const tileData = new Map();
  let antLayer = null, antennas = [];
  function lon2tile(lon, z) { return (lon + 180) / 360 * Math.pow(2, z); }
  function lat2tile(lat, z) { const r = lat * Math.PI / 180; return (1 - Math.log(Math.tan(r) + 1 / Math.cos(r)) / Math.PI) / 2 * Math.pow(2, z); }
  const DEM_HOSTS = [
    'https://s3.amazonaws.com/elevation-tiles-prod/terrarium',
    'https://elevation-tiles-prod.s3.dualstack.us-east-1.amazonaws.com/terrarium',
    'https://s3.dualstack.us-east-1.amazonaws.com/elevation-tiles-prod/terrarium'
  ];
  function loadDemImg(url) {
    return new Promise((res, rej) => {
      const img = new Image(); img.crossOrigin = 'anonymous';
      img.onload = () => res(img); img.onerror = () => rej(new Error('img'));
      img.src = url;
    });
  }
  function getTile(z, x, y) {
    const key = z + '/' + x + '/' + y;
    if (tileData.has(key)) return Promise.resolve();
    return (async () => {
      let lastErr;
      for (const h of DEM_HOSTS) {
        try {
          const img = await loadDemImg(h + '/' + z + '/' + x + '/' + y + '.png');
          const c = document.createElement('canvas'); c.width = 256; c.height = 256;
          const ctx = c.getContext('2d'); ctx.drawImage(img, 0, 0);
          tileData.set(key, ctx.getImageData(0, 0, 256, 256).data);
          return;
        } catch (e) { lastErr = e; }
      }
      throw lastErr || new Error('tile');
    })();
  }
  async function demPrefetch(latC, lngC, rangeM) {
    const dLat = rangeM / 111320, dLng = rangeM / (111320 * Math.cos(latC * Math.PI / 180)), z = DEM_Z;
    const xs = [Math.floor(lon2tile(lngC - dLng, z)), Math.floor(lon2tile(lngC + dLng, z))];
    const ys = [Math.floor(lat2tile(latC + dLat, z)), Math.floor(lat2tile(latC - dLat, z))];
    const jobs = [];
    for (let x = Math.min(...xs); x <= Math.max(...xs); x++)
      for (let y = Math.min(...ys); y <= Math.max(...ys); y++) jobs.push(getTile(z, x, y));
    await Promise.all(jobs);
  }
  function elevSync(lat, lng) {
    const z = DEM_Z, xf = lon2tile(lng, z), yf = lat2tile(lat, z);
    const x = Math.floor(xf), y = Math.floor(yf);
    const d = tileData.get(z + '/' + x + '/' + y); if (!d) return null;
    const px = Math.min(255, Math.floor((xf - x) * 256)), py = Math.min(255, Math.floor((yf - y) * 256));
    const i = (py * 256 + px) * 4;
    return (d[i] * 256 + d[i + 1] + d[i + 2] / 256) - 32768;
  }
  // межа прямої видимості по кожному азимуту з кривизною 4/3 + Френель
  async function buildSector(lat, lng, azC, half, range, antH, tgtH, freq) {
    await demPrefetch(lat, lng, range);
    const k = 1.33, R = 6371000, lam = freq > 0 ? 299792458 / (freq * 1e6) : 0;
    const g0 = elevSync(lat, lng); if (g0 == null) return null;
    const Hobs = g0 + antH, step = Math.max(30, range / 300);
    const pts = [[lat, lng]];
    for (let az = azC - half; az <= azC + half + 0.001; az += Math.max(2, half / 12)) {
      const A = (az + 360) % 360;
      let maxAng = -Infinity, reach = range;
      for (let d = step; d <= range; d += step) {
        const p = destPoint(lat, lng, A, d);
        const t = elevSync(p[0], p[1]); if (t == null) { reach = d - step; break; }
        const curv = d * d / (2 * k * R);
        const fres = lam > 0 ? 0.6 * Math.sqrt(lam * d * Math.max(1, range - d) / range) : 0;
        const angTerr = ((t + fres - curv) - Hobs) / d;   // перешкода (із запасом Френеля)
        const angTgt = ((t + tgtH - curv) - Hobs) / d;    // ціль на цій дальності
        if (angTgt < maxAng) { reach = d - step; break; }
        if (angTerr > maxAng) maxAng = angTerr;
      }
      pts.push(destPoint(lat, lng, A, Math.max(step, reach)));
    }
    return pts;
  }
  $('#antbuild').addEventListener('click', async () => {
    if (!lmarker || !pickedCoords) { $('#mapcoords').textContent = 'Спочатку постав точку'; return; }
    const az = coneDir();
    if (az == null) { $('#mapcoords').textContent = 'Задай азимут (Компас або повзунок Азимут)'; return; }
    const ll = lmarker.getLatLng();
    const antH = parseFloat($('#anth').value) || 0, tgtH = parseFloat($('#tgth').value) || 0, freq = parseFloat($('#antfreq').value) || 0;
    $('#antbuild').disabled = true; $('#mapcoords').textContent = 'Рахую рельєф…';
    try {
      const poly = await buildSector(ll.lat, ll.lng, az, coneHalf, coneR, antH, tgtH, freq);
      if (!poly) { $('#mapcoords').textContent = 'Нема даних висот'; return; }
      const col = ANT_COLORS[antennas.length % ANT_COLORS.length];
      L.polygon(poly, { color: col, weight: 1, fillColor: col, fillOpacity: 0.3, interactive: false }).addTo(antLayer);
      L.circleMarker([ll.lat, ll.lng], { radius: 6, color: col, weight: 2, fillColor: col, fillOpacity: 0.9 })
        .bindTooltip(pickedCoords + ' · ' + deg(az) + ' · ' + antH + 'м', { direction: 'top' }).addTo(antLayer);
      antennas.push({ lat: ll.lat, lng: ll.lng, az, col });
      $('#mapcoords').textContent = '✓ антена ' + deg(az) + ' · ' + fmtLen(coneR);
    } catch (e) {
      $('#mapcoords').textContent = 'Рельєф недоступний (мережа/CORS)';
    } finally { $('#antbuild').disabled = false; }
  });
  $('#antclear').addEventListener('click', () => { if (antLayer) antLayer.clearLayers(); antennas = []; });
  $('#fixclear').addEventListener('click', () => { fixedPts = []; saveFixed(); drawFixed(); });
  // початкові значення повзунків
  $('#conelen').value = coneR; $('#coneang').value = coneHalf * 2; $('#coneaz').value = manualAz;
  $('#lenval').textContent = fmtLen(coneR); $('#angval').textContent = coneHalf * 2; $('#azval').textContent = manualAz;

  // ---- PWA: service worker + кероване оновлення (за запитом) ----
  function promptUpdate(worker) {
    if (!worker) return;
    try {
      const mc = new MessageChannel();
      mc.port1.onmessage = ev => {
        const d = ev.data || {};
        $('#upver').textContent = 'Доступне оновлення' + (d.version ? ' · ' + d.version : '');
        $('#upnotes').textContent = (d.notes || []).map(n => '• ' + n).join('\n');
      };
      worker.postMessage({ type: 'getVersion' }, [mc.port2]);
    } catch (e) {}
    $('#update').hidden = false;
    $('#upyes').onclick = () => { $('#upyes').disabled = true; $('#upver').textContent = 'Оновлення…'; worker.postMessage('skipWaiting'); };
    $('#upno').onclick = () => { $('#update').hidden = true; };
  }
  if ('serviceWorker' in navigator) {
    const hadController = !!navigator.serviceWorker.controller;
    let reloading = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (!hadController || reloading) return;   // перший запуск — без перезавантаження
      reloading = true; location.reload();
    });
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').then(reg => {
        if (reg.waiting && navigator.serviceWorker.controller) promptUpdate(reg.waiting);
        reg.addEventListener('updatefound', () => {
          const nw = reg.installing;
          if (nw) nw.addEventListener('statechange', () => {
            if (nw.state === 'installed' && navigator.serviceWorker.controller) promptUpdate(reg.waiting || nw);
          });
        });
        setInterval(() => reg.update().catch(() => {}), 30 * 60 * 1000);  // тиха перевірка наявності оновлення
      }).catch(() => {});
    });
  }
  // ---- встановлення PWA (на будь-який пристрій; iOS — через інструкцію) ----
  let deferredPrompt = null;
  const isStandalone = matchMedia('(display-mode: standalone)').matches || navigator.standalone === true;
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent) ||
                (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
  // показуємо кнопку всюди, де застосунок ще не запущено як встановлений
  if (!isStandalone) $('#install').hidden = false;

  window.addEventListener('beforeinstallprompt', e => { e.preventDefault(); deferredPrompt = e; $('#install').hidden = false; });

  $('#install').addEventListener('click', async () => {
    if (deferredPrompt) {                       // Chrome/Edge/Android — рідний діалог
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
      status(outcome === 'accepted' ? '✓ Встановлюється…' : 'Скасовано', outcome === 'accepted' ? 'ok' : 'dim');
      return;
    }
    // інакше — інструкція (iOS Safari, або браузер без авто-промпта)
    $('#hhtext').textContent = isIOS
      ? 'Safari: натисни «Поділитися» (квадрат зі стрілкою вгору) унизу екрана → «На початковий екран» (Add to Home Screen).'
      : 'Меню браузера (⋮ або ⠇) → «Встановити застосунок» / «Add to Home screen». Можна встановити на кожен пристрій окремо.';
    $('#installhelp').hidden = false;
  });
  $('#hhok').addEventListener('click', () => { $('#installhelp').hidden = true; });
  window.addEventListener('appinstalled', () => { $('#install').hidden = true; $('#installhelp').hidden = true; status('✓ Встановлено', 'ok'); });

  // ---- скидання зміни (подвійне натискання для підтвердження) ----
  let resetArmed = false, resetTimer = null;
  $('#reset').addEventListener('click', () => {
    if (!resetArmed) {
      resetArmed = true;
      $('#reset').classList.add('confirm');
      status('Натисніть ще раз, щоб обнулити зміну.', 'dim');
      resetTimer = setTimeout(() => { resetArmed = false; $('#reset').classList.remove('confirm'); }, 4000);
      return;
    }
    clearTimeout(resetTimer); resetArmed = false;
    $('#reset').classList.remove('confirm');
    flights = []; activeRec = null; saveFlights(); renderStats();
    status('✓ Зміну скинуто', 'ok');
  });

  // ---- сохранение перед обновлением/закрытием страницы ----
  function flush() {
    const f = JSON.stringify(flights);
    const nm = $('#callsign').value;
    store.set('kap_flights', f); store.set('kap_name', nm); store.set('kap_reportmode', reportMode);
    idbSet('kap_flights', flights); idbSet('kap_name', nm); idbSet('kap_reportmode', reportMode);
  }
  document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden') flush(); });
  window.addEventListener('pagehide', flush);
  window.addEventListener('beforeunload', flush);

  // ---- загрузка из IndexedDB (приоритет у более полной записи) ----
  (async function initDB() {
    try {
      const [f, nm, rm] = await Promise.all([idbGet('kap_flights'), idbGet('kap_name'), idbGet('kap_reportmode')]);
      const tpl = await idbGet('kap_templates');
      if (Array.isArray(f) && f.length >= flights.length) {
        flights = f.map(x => ({ t: x.t, c: x.c || '', lt: x.lt }));
      }
      if (Array.isArray(tpl) && !store.get('kap_templates')) { templates = tpl; renderTemplates(); }
      if (typeof nm === 'string' && !store.get('kap_name')) $('#callsign').value = nm;
      if (typeof rm === 'string' && store.get('kap_reportmode') == null) setMode(rm);
    } catch (e) {}
    nameToggleLabel(); saveFlights(); renderStats();
  })();

  saveFlights(); renderStats();
  setInterval(() => { saveFlights(); renderStats(); }, 60000);
</script>
